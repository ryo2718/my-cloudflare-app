<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ログイン — Preflop Strategy Viewer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #faf6f0;
        color: #3d2f1f;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        background: #fefdf9;
        border: 1px solid #d6cfc1;
        border-radius: 0.75rem;
        padding: 2rem 1.75rem;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 8px 32px rgba(60, 40, 20, 0.06);
      }
      .eyebrow {
        font-size: 0.7rem;
        color: #8c7d6a;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }
      h1 {
        margin: 0 0 1.25rem;
        font-size: 1.4rem;
        font-weight: 700;
        color: #3d2f1f;
      }
      label {
        display: block;
        font-size: 0.78rem;
        color: #6b5a48;
        margin-bottom: 0.4rem;
        font-weight: 500;
      }
      input[type="password"] {
        width: 100%;
        background: #f5efe5;
        border: 1px solid #d6cfc1;
        border-radius: 0.4rem;
        padding: 0.6rem 0.75rem;
        font-size: 1rem;
        color: #3d2f1f;
        font-family: ui-monospace, SFMono-Regular, monospace;
        outline: none;
        transition: border-color 0.1s;
      }
      input[type="password"]:focus { border-color: #b45309; }
      input[type="password"][aria-invalid="true"] { border-color: #ef4444; }
      button {
        margin-top: 1rem;
        width: 100%;
        background: #b45309;
        color: #fff;
        border: none;
        border-radius: 0.4rem;
        padding: 0.65rem 1rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.1s;
      }
      button:hover:not([disabled]) { background: #92400e; }
      button[disabled] { opacity: 0.55; cursor: not-allowed; }
      .error {
        margin-top: 0.6rem;
        color: #b91c1c;
        font-size: 0.8rem;
        min-height: 1.1em;
      }
      .footer {
        margin-top: 1.25rem;
        font-size: 0.7rem;
        color: #b0a18e;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">Preflop Strategy Viewer</div>
      <h1>ログイン</h1>
      <form id="login-form" autocomplete="off">
        <label for="password">パスワード</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          inputmode="text"
          autofocus
          required
        />
        <div id="error" class="error" role="alert" aria-live="polite"></div>
        <button id="submit" type="submit">入る</button>
      </form>
      <div class="footer">セッションは 30 日間保持されます</div>
    </main>

    <script>
      (function () {
        const form = document.getElementById('login-form');
        const input = document.getElementById('password');
        const errEl = document.getElementById('error');
        const btn = document.getElementById('submit');

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          errEl.textContent = '';
          input.removeAttribute('aria-invalid');
          btn.disabled = true;
          btn.textContent = '確認中…';

          try {
            const res = await fetch('/api/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ password: input.value }),
              credentials: 'same-origin',
            });
            if (res.ok) {
              window.location.replace('/');
              return;
            }
            const data = await res.json().catch(function () { return {}; });
            if (res.status === 401) {
              errEl.textContent = 'パスワードが違います';
            } else if (res.status === 500) {
              errEl.textContent = 'サーバ側の認証設定が未完了です';
            } else {
              errEl.textContent = 'ログインできませんでした (' + (data.error || res.status) + ')';
            }
            input.setAttribute('aria-invalid', 'true');
            input.select();
          } catch (err) {
            errEl.textContent = 'ネットワークエラー: ' + (err && err.message ? err.message : err);
          } finally {
            btn.disabled = false;
            btn.textContent = '入る';
          }
        });
      })();
    </script>
  </body>
</html>
